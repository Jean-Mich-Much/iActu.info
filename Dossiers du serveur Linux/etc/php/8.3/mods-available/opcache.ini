; configuration for php opcache module
; priority=10
zend_extension=opcache.so

opcache.enable=1

opcache.jit_buffer_size=108M
opcache.jit=1255
opcache.interned_strings_buffer=24
opcache.memory_consumption=144

opcache.jit_prof_threshold=0.004
opcache.jit_max_root_traces=1280
opcache.jit_max_side_traces=160
opcache.jit_max_exit_counters=10240
opcache.jit_hot_loop=48
