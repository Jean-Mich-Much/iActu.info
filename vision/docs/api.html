<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>API Happy! – Vision</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050816;
            --bg-alt: #0b1020;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.25);
            --accent-strong: rgba(129, 140, 248, 0.35);
            --border-subtle: rgba(148, 163, 184, 0.35);
            --text-main: #e5e7eb;
            --text-soft: #9ca3af;
            --text-strong: #f9fafb;
            --danger: #f97373;
            --success: #4ade80;
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.85);
            --radius-lg: 18px;
            --radius-xl: 24px;
            --blur-strong: 22px;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
            color: var(--text-main);
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 32px 16px;
            font-size: 16px;
        }

        .app-shell {
            flex: 1;
            max-width: 1280px;
            background: rgba(15, 23, 42, 0.92);
            border-radius: 28px;
            border: 1px solid rgba(148, 163, 184, 0.35);
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-inner { display: flex; flex: 1; padding: 18px; gap: 18px; }

        .sidebar {
            flex: 0 0 300px;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar-title h1 { margin: 0; font-size: 20px; color: var(--text-strong); text-transform: uppercase; }
        
        .sidebar-search input {
            flex: none;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            padding: 8px 12px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
        }

        .command-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }

        .command-item {
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .command-item.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .main-panel {
            flex: 1;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-block {
            margin: 14px 0;
            border-radius: 14px;
            background: #020617;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .code-block-header {
            padding: 8px 12px;
            background: #1e293b;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .code-block-content { padding: 12px; }

        pre {
            margin: 0;
            font-family: monospace;
            font-size: 16px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .copy-btn, .home-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 16px;
        }

        @media (max-width: 960px) {
            .app-inner { flex-direction: column; }
            .sidebar { flex: none; flex-direction: row; overflow-x: auto; }
        }
    </style>
</head>

<body>
<div class="app-shell">
    <div class="app-inner">
        <aside class="sidebar">
            <div class="sidebar-title">
                <h1>API Happy!</h1>
            </div>
            <div class="sidebar-search">
                <input type="text" id="apiSearch" placeholder="Chercher une commande...">
            </div>
            <div class="command-list" id="apiList">
                <!-- rempli par JS -->
            </div>
            <div style="margin-top:auto">
                <button class="home-btn" onclick="location.href='vision.html'">🏠 Vue d'ensemble</button>
            </div>
        </aside>

        <main class="main-panel">
            <div id="apiContent" class="content-scroll">
                <!-- rempli par JS -->
            </div>
        </main>
    </div>
</div>
<script>
// --- Liste des API Vision (triées A → Z) ---
const apiCommands = [
    "clean",
    "count",
    "create",
    "delete",
    "exists",
    "find",
    "graph",
    "link",
    "read",
    "relations",
    "stats",
    "unlink",
    "update",
    "include"
];


// --- Contenu de chaque API (sera rempli dans la PARTIE 3) ---
const apiContentData = {}; // rempli plus tard

// --- Remplit le menu de gauche ---
function buildMenu() {
    const list = document.getElementById("apiList");
    list.innerHTML = "";

    apiCommands.forEach(cmd => {
        const item = document.createElement("div");
        item.className = "command-item";
        item.dataset.cmd = cmd;
        item.textContent = cmd.toUpperCase();
        item.addEventListener("click", () => selectAPI(cmd));
        list.appendChild(item);
    });
}

// --- Recherche ---
document.getElementById("apiSearch").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll(".command-item").forEach(item => {
        item.style.display = item.dataset.cmd.includes(val) ? "flex" : "none";
    });
});

// --- Active un item du menu ---
function highlightMenu(cmd) {
    document.querySelectorAll(".command-item").forEach(el => {
        el.classList.toggle("active", el.dataset.cmd === cmd);
    });
}

// --- Affiche une API dans la zone centrale ---
function selectAPI(cmd) {
    highlightMenu(cmd);

    const container = document.getElementById("apiContent");
    const html = apiContentData[cmd] || "<p>Contenu manquant.</p>";
    container.innerHTML = html;

    setupCopyButtons();
}

// --- Boutons “copier le code” ---
function setupCopyButtons() {
    document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.onclick = () => {
            const pre = btn.closest(".code-block").querySelector("pre code");
            const text = pre.innerText;

            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerHTML;
                btn.innerHTML = "✔ Copié";
                setTimeout(() => btn.innerHTML = old, 1200);
            });
        };
    });
}

// --- Initialisation ---
document.addEventListener("DOMContentLoaded", () => {
    buildMenu();
    selectAPI(apiCommands[0]); // première API affichée par défaut
});
</script>

<h1>📦 include() — Charger Vision dans votre projet</h1>

<p><strong>Débutant :</strong> C'est l'unique étape d'installation. Ajoutez une seule ligne de code <code>include "vision/vision.php";</code> au début de votre site et <strong>votre base de données est prête</strong>. 
Il n'y a aucun serveur à configurer, aucun mot de passe, aucune table à créer.</p>

<p><strong>Intermédiaire :</strong> L'inclusion exécute l'Auto-Bootstrap : elle initialise les chemins, 
le système de verrouillage, le gestionnaire de mémoire (RAM) et rend l'API <code>Vision_API</code> accessible partout.</p>

<p><strong>Expert :</strong> L’include exécute un bootstrap complet :  
détection du dossier Vision, chargement du cache interne,  
préparation des shards, autoload minimaliste, et exposition des classes  
<code>Vision_API</code>, <code>Vision_Wave</code>, <code>Vision_Cell</code>.  
Aucune dépendance externe, aucune surcharge mémoire.</p>

<h2>✨ Exemple n°1 (simple)</h2>
