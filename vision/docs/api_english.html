<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>API Happy! – Vision (EN)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --bg: #050816;
            --bg-alt: #0b1020;
            --accent: #4f46e5;
            --accent-soft: rgba(79, 70, 229, 0.25);
            --accent-strong: rgba(129, 140, 248, 0.35);
            --border-subtle: rgba(148, 163, 184, 0.35);
            --text-main: #e5e7eb;
            --text-soft: #9ca3af;
            --text-strong: #f9fafb;
            --danger: #f97373;
            --success: #4ade80;
            --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.85);
            --radius-lg: 18px;
            --radius-xl: 28px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
            background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
            color: var(--text-main);
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 32px 16px;
            font-size: 16px;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            max-width: 1280px;
            flex: 1;
            background: rgba(15, 23, 42, 0.92);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-subtle);
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }

        .app-inner { display: flex; flex: 1; padding: 18px; gap: 18px; }

        .sidebar {
            flex: 0 0 300px;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar-title h1 { margin: 0; font-size: 20px; color: var(--text-strong); text-transform: uppercase; }
        
        .sidebar-search input {
            flex: none;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-subtle);
            padding: 8px 12px;
            border-radius: 999px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .command-list { display: flex; flex-direction: column; gap: 6px; overflow-y: auto; }

        .command-item {
            border-radius: 999px;
            padding: 7px 12px;
            font-size: 16px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
        }

        .command-item.active {
            border-color: var(--accent);
            background: var(--accent-soft);
        }

        .main-panel {
            flex: 1;
            background: rgba(15, 23, 42, 0.96);
            border-radius: 22px;
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .content-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
        }

        .code-block {
            margin: 14px 0;
            border-radius: 14px;
            background: #020617;
            border: 1px solid var(--border-subtle);
            overflow: hidden;
        }

        .code-block-header {
            padding: 8px 12px;
            background: #1e293b;
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }

        .code-block-content { padding: 12px; }

        pre {
            margin: 0;
            font-family: monospace;
            font-size: 16px;
            color: #e5e7eb;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .copy-btn, .home-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 16px;
        }

        h1, h2, h3 {
            margin: 0 0 8px 0;
            color: var(--text-strong);
        }

        h1 {
            font-size: 20px;
        }

        h2 {
            font-size: 18px;
            margin-top: 16px;
        }

        p {
            margin: 6px 0;
            font-size: 16px;
            line-height: 1.5;
            color: var(--text-main);
        }

        strong {
            color: var(--text-strong);
        }

        @media (max-width: 960px) {
            .app-inner { flex-direction: column; }
            .sidebar { flex: none; flex-direction: row; overflow-x: auto; }
        }
    </style>
</head>
<body>
<div class="app-shell">
    <div class="app-inner">
        <aside class="sidebar">
            <div class="sidebar-title">
                <h1>API Happy!</h1>
            </div>
            <div class="sidebar-search">
                <input type="text" id="apiSearch" placeholder="Search command...">
            </div>
            <div class="command-list" id="apiList">
                <!-- filled by JS -->
            </div>
            <div style="margin-top:auto">
                <button class="home-btn" onclick="location.href='vision_english.html'">🏠 Overview</button>
            </div>
        </aside>

        <main class="main-panel">
            <div id="apiContent" class="content-scroll">
                <!-- JS will inject API content here -->
            </div>
        </main>
    </div>
</div>
<script>
const apiCommands = [
    "clean",
    "count",
    "create",
    "delete",
    "exists",
    "find",
    "graph",
    "link",
    "read",
    "relations",
    "stats",
    "unlink",
    "update",
    "include"
];

const apiContentData = {};

function buildMenu() {
    const list = document.getElementById("apiList");
    list.innerHTML = "";

    apiCommands.forEach(cmd => {
        const item = document.createElement("div");
        item.className = "command-item";
        item.dataset.cmd = cmd;
        item.textContent = cmd.toUpperCase();
        item.addEventListener("click", () => selectAPI(cmd));
        list.appendChild(item);
    });
}

document.getElementById("apiSearch").addEventListener("input", (e) => {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll(".command-item").forEach(item => {
        item.style.display = item.dataset.cmd.includes(val) ? "flex" : "none";
    });
});

function highlightMenu(cmd) {
    document.querySelectorAll(".command-item").forEach(el => {
        el.classList.toggle("active", el.dataset.cmd === cmd);
    });
}

function selectAPI(cmd) {
    highlightMenu(cmd);
    const container = document.getElementById("apiContent");
    container.innerHTML = apiContentData[cmd] || "<p>Missing content.</p>";
    setupCopyButtons();
}

function setupCopyButtons() {
    document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.onclick = () => {
            const pre = btn.closest(".code-block").querySelector("pre code");
            const text = pre.innerText;
            navigator.clipboard.writeText(text).then(() => {
                const old = btn.innerHTML;
                btn.innerHTML = "✔ Copied";
                setTimeout(() => btn.innerHTML = old, 1200);
            });
        };
    });
}

document.addEventListener("DOMContentLoaded", () => {
    buildMenu();
    selectAPI(apiCommands[0]);
});
// CLEAN
apiContentData["clean"] = `
<h1>🧹 clean() — Automatic Maintenance</h1>

<p><strong>Beginner:</strong> This is the engine's "broom". Use this command to delete forgotten temporary files or empty data. It keeps Vision clean and fast.</p>
<p><strong>Intermediate:</strong> clean() removes all <code>.vr</code> files in the data folder in a safe, atomic way.</p>
<p><strong>Expert:</strong> clean() wipes all shards, relations and metadata. It is designed for test environments and full resets.</p>

<h2>✨ Example #1</h2>
<div class="code-block">
<div class="code-block-header"><span>Basic reset</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::clean();</code></pre></div>
</div>

<h2>⚙️ Example #2</h2>
<div class="code-block">
<div class="code-block-header"><span>Reset before a test suite</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>Vision_API::clean();
// Now you can safely seed your test data
Vision_API::create(["role" =&gt; "admin"]);</code></pre></div>
</div>

<h2>🧠 Example #3</h2>
<div class="code-block">
<div class="code-block-header"><span>Reset in a CLI script</span><button class="copy-btn">Copy</button></div>
<div class="code-block-content"><pre><code>if (in_array('--reset', $argv, true)) {
    echo "Resetting Vision...\\n";
    Vision_API::clean();
    echo "Done.\\n";
}</code></pre></div>
</div>
`;

<h1>📦 include() — Load Vision into your project</h1>

<p><strong>Beginner:</strong> This is the only installation step. Add a single line of code <code>include "vision/vision.php";</code> at the beginning of your site and <strong>your database is ready</strong>. 
There is no server to configure, no password, no table to create.</p>

<p><strong>Intermediate:</strong> The inclusion executes the Auto-Bootstrap: it initializes paths, 
the locking system, the memory manager (RAM) and makes the <code>Vision_API</code> accessible everywhere.</p>

<p><strong>Expert:</strong> The include performs a full bootstrap: path detection, internal cache, shards, minimal autoload, and exposes <code>Vision_API</code>, <code>Vision_Wave</code>, <code>Vision_Cell</code>.</p>
